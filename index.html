<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zen Pong</title>
<style>
@font-face{
  font-family:'Basier Circle';
  src:url('fonts/BasierCircle-Regular.woff2') format('woff2');
  font-weight:400;font-style:normal;font-display:swap}
@font-face{
  font-family:'Basier Circle';
  src:url('fonts/BasierCircle-RegularItalic.woff2') format('woff2');
  font-weight:400;font-style:italic;font-display:swap}
@font-face{
  font-family:'Basier Circle';
  src:url('fonts/BasierCircle-Medium.woff2') format('woff2');
  font-weight:500;font-style:normal;font-display:swap}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
*{font-family:'Basier Circle',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#383838;cursor:none}
body{display:flex;align-items:center;justify-content:center;user-select:none}

/* ── custom cursor ──────────────────────────────── */
#cursor{position:fixed;pointer-events:none;z-index:9999;
  width:24px;height:24px;border:1px solid rgba(200,190,170,0.5);
  border-radius:50%;transform:translate(-50%,-50%)}

/* ── viewport scaling container ─────────────────── */
#gc{display:flex;flex-direction:column;align-items:center;
  transform-origin:center center;will-change:transform}

/* ── state visibility ────────────────────────────── */
[data-state="idle"] .vis-play,[data-state="idle"] .vis-end{display:none!important}
[data-state="playing"] .vis-idle,[data-state="playing"] .vis-end{display:none!important}
[data-state="results"] .vis-idle,[data-state="results"] .vis-play{display:none!important}

/* ── title above canvas — always visible ─────────── */
#title-above{
  display:flex;align-items:center;justify-content:center;
  gap:0;padding:0 0 18px 0;height:45px;width:1000px}

/* tagline + title state visibility */
[data-state="idle"] #title-above{display:none!important}
[data-state="idle"] #tagline{display:block!important}
[data-state="playing"] #title-above{display:flex!important}
[data-state="playing"] #tagline{display:none!important}
[data-state="results"] #title-above{display:flex!important}
[data-state="results"] #tagline{display:none!important}
#tagline{
  font-family:'Basier Circle',sans-serif;
  font-style:italic;
  font-size:13px;
  font-weight:400;
  color:#FFF5E5;
  letter-spacing:1px;
  text-align:center;
  padding-bottom:14px;
  display:none}

/* ── canvas frame ────────────────────────────────── */
/* #wrap contains the border-ring div + canvas + paddle divs */
#wrap{position:relative;width:1000px;height:630px}

/* The visible grey border ring — a div that wraps the canvas */
#frame{
  position:absolute;inset:0;
  border-radius:48px;
  border:8px solid #888888;
  box-shadow:0 4px 24px rgba(0,0,0,0.28);
  pointer-events:none;
  z-index:2}
#frame.canvas-glow{
  box-shadow:0 0 0 4px rgba(255,215,140,0.22),0 0 28px rgba(255,215,140,0.22)!important}

/* The canvas — fills #wrap exactly, rounded to match border ring */
#c{
  display:block;
  position:absolute;
  inset:0;
  width:1000px;
  height:630px;
  border-radius:48px;
  z-index:1}

/* ── DOM paddles — positioned outside canvas via absolute CSS ── */
/* ── DOM PADDLES ─────────────────────────────────────
   Correct geometry — both bar and dot are OUTSIDE the canvas,
   in the dark charcoal area. Nothing inside the cream canvas.

   Left paddle (reading left to right):
   [dot 8px] [gap 4px] [bar 8px] | canvas edge

   Right paddle (reading left to right):
   canvas edge | [bar 8px] [gap 4px] [dot 8px]

   The paddle-wrap sits to the LEFT of #wrap (left paddle)
   or to the RIGHT of #wrap (right paddle) using right:100% / left:100%.
   ─────────────────────────────────────────────────── */
.paddle-wrap{
  position:absolute;
  top:0;
  pointer-events:none;
  z-index:4;
  width:20px}   /* bar(8) + gap(4) + dot(8) = 20px */

/* Left wrap: shift right by bar-width(8px) so bar LEFT edge = canvas left edge.
   Bar sits half inside canvas, half outside. Dot hangs outside to the left. */
#paddle-left{ right:calc(100% - 8px) }

/* Right wrap: shift left by bar-width(8px) so bar RIGHT edge = canvas right edge. */
#paddle-right{ left:calc(100% - 8px) }

/* Bar — inside wrap, absolute */
.paddle-bar{
  position:absolute;
  width:8px;
  height:64px;
  border-radius:4px;
  top:0}

/* Left bar: its RIGHT edge is at x=20 of wrap = touches canvas */
#paddle-left .paddle-bar{ right:0 }

/* Right bar: its LEFT edge is at x=0 of wrap = touches canvas */
#paddle-right .paddle-bar{ left:0 }

/* Dot — inside wrap, absolute, vertically centred on bar */
.paddle-dot{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  top:28px}   /* (64-8)/2 = 28 = vertically centred */

/* Left dot: at x=0 of wrap (far left, away from canvas) */
#paddle-left .paddle-dot{ left:0 }

/* Right dot: at x=12 of wrap (right:0, far right, away from canvas) */
#paddle-right .paddle-dot{ right:0 }

#paddle-left .paddle-bar,#paddle-left .paddle-dot{ background:#FF68AE }
#paddle-right .paddle-bar,#paddle-right .paddle-dot{ background:#689AFF }
[data-state="results"] .paddle-wrap{ display:none!important }
@keyframes paddle-flash{
  0%{filter:brightness(1)}
  15%{filter:brightness(3.5)}
  100%{filter:brightness(1)}}
.paddle-hit{
  animation:paddle-flash 0.15s ease-out forwards}

/* intro card */
#intro-card{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(245,205,142,0.24);
  backdrop-filter:blur(9px);
  -webkit-backdrop-filter:blur(9px);
  border-radius:12px;
  padding:24px 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.16);
  pointer-events:all;
  cursor:pointer;
  z-index:10;
  transition:opacity 0.3s ease,transform 0.3s ease}
.card-sub{
  font-style:italic;
  font-size:14px;
  letter-spacing:1.5px;
  color:rgba(30,25,16,0.55);
  text-align:center;
  font-family:'Basier Circle',sans-serif}
[data-state="idle"] #intro-card{display:flex!important}
[data-state="playing"] #intro-card{display:none!important}
[data-state="results"] #intro-card{display:none!important}

#intro-card.card-hide{
  opacity:0!important;
  transform:translate(-50%,-50%) scale(0.96)!important;
  pointer-events:none}

/* you label — sits further left of the left paddle wrap */
#you-label{
  position:absolute;
  right:calc(100% + 4px);  /* to the left of paddle-left wrap */
  top:28px;
  transform:translateY(-50%);
  font-family:'Basier Circle',sans-serif;
  font-style:italic;
  font-size:12px;
  color:#FF68AE;
  letter-spacing:1px;
  pointer-events:none;
  white-space:nowrap;
  display:none}
[data-state="idle"] #you-label{ display:block!important }

/* ── UNIFIED CONTROL ELEVATION ───────────────────────
   All controls: 48px height, 12px radius, same shadow.
   This is the CTA Elevation from DESIGN.md applied consistently. */
.ctrl-chip{
  height:48px;
  border-radius:12px;
  background:#464646;
  box-shadow:0 4px 24px rgba(0,0,0,0.29),inset 0 0 5px rgba(0,0,0,0.52);
  display:flex;
  align-items:center;
  flex-shrink:0}

/* colour picker pill */
#pal-pill{
  padding:0 16px;
  gap:8px;
  cursor:default}
.pdot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  cursor:pointer;transition:transform .15s}
.pdot:hover{transform:scale(1.35)}
#shuffle-btn{
  width:18px;height:18px;flex-shrink:0;opacity:.65;
  cursor:pointer;transition:opacity .2s;margin-left:4px}
#shuffle-btn:hover{opacity:1}

/* score badge */
#score-pill{
  gap:32px;
  padding:0 24px;
  justify-content:center}
#score-you,#score-ai{
  font-family:'Basier Circle',sans-serif;font-weight:500;font-size:18px;
  color:#FFFFFF;letter-spacing:0.1em;min-width:20px;text-align:center}
@keyframes score-pulse{
  0%{color:#FFFFFF}
  30%{color:#FFAE68}
  100%{color:#FFFFFF}}
.score-pop{
  animation:score-pulse 0.4s ease-out forwards}

/* icon buttons */
#restart-pill,#mute-pill{
  padding:0 14px;
  gap:0;
  cursor:pointer;
  transition:opacity .2s}
#restart-pill:hover,#mute-pill:hover{opacity:.8}
#restart-pill svg,#mute-pill svg{width:18px;height:18px;opacity:.8}
#mute-pill.muted{opacity:.35}

/* ── controls row layout ────────────────────────── */
#ctrl-row{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  width:1000px;
  padding:20px 0 0 0;
  height:68px}
[data-state="results"] #ctrl-row{display:none!important}
.ctrl-left{display:flex;align-items:center;justify-content:flex-start}
.ctrl-center{display:flex;align-items:center;justify-content:center}
.ctrl-right{display:flex;align-items:center;justify-content:flex-end;gap:12px}

/* idle: centre picker, hide score and icons */
[data-state="idle"] #ctrl-row{grid-template-columns:1fr;justify-items:center}
[data-state="idle"] .ctrl-left{justify-content:center}
[data-state="idle"] .ctrl-right{display:none}
[data-state="idle"] #score-pill{display:none!important}

/* quote below canvas */
#quote-below{
  font-family:'DM Serif Display',serif;
  font-style:italic;
  font-size:12px;
  font-weight:400;
  letter-spacing:1px;
  line-height:1.8;
  color:rgba(245,240,230,0.7);
  text-align:center;
  max-width:1000px;
  margin-top:32px;
  display:none}
[data-state="results"] #quote-below{display:block!important}

/* results state canvas — frame ring stays, deepen shadow */
[data-state="results"] #frame{
  border-color:transparent!important;
  box-shadow:inset 0 0 40px rgba(0,0,0,0.10)!important}


/* ── results row ─────────────────────────────────── */
#result-row{display:flex;align-items:center;justify-content:center;
  gap:16px;padding:24px 0 0 0}
.rbtn{background:#464646;border:none;border-radius:12px;
  padding:12px 24px;
  font-family:'Basier Circle',sans-serif;font-weight:500;font-size:11px;
  letter-spacing:0.12em;color:#FFFFFF;text-transform:uppercase;
  cursor:pointer;transition:opacity .2s;
  box-shadow:0 4px 24px rgba(0,0,0,0.16),inset 0 0 5px rgba(0,0,0,0.32)}
.rbtn:hover{opacity:0.85}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════
   ZEN PONG v5
═══════════════════════════════════════════════════════ */

const cv=document.getElementById('c'),cx=cv.getContext('2d');
const gc=document.getElementById('gc');
const cursorEl=document.getElementById('cursor');
const frameEl=document.getElementById('frame');
const youLabel=document.getElementById('you-label');
const introCard=document.getElementById('intro-card');
const domPaddleLeft=document.getElementById('paddle-left');
const domPaddleRight=document.getElementById('paddle-right');

/* ── CONSTANTS ──────────────────────────────────── */
const W=1000,H=630,PW=8,PH=64,BR=6;
const CR=40;
const PX=-PW,AX=W;
const PAD_MIN=CR,PAD_MAX=H-CR-PH;
const BASE_SPD=5.2,WIN=3;
const MAX_SPD=BASE_SPD*2.2;
const CORNERS=[{cx:CR,cy:CR},{cx:W-CR,cy:CR},{cx:CR,cy:H-CR},{cx:W-CR,cy:H-CR}];

/* ── PALETTE ─────────────────────────────────────── */
const PALETTE={
  cols:['#FF68AE','#689AFF','#8CFFB4','#FFAE68','#68D7FF'],
  pL:'#FF68AE',
  pR:'#689AFF'
};
let colIdx=0;
function pal(){return PALETTE}
function nextCol(){const c=pal().cols;colIdx=(colIdx+1)%c.length;return c[colIdx]}

/* ── ZEN QUOTES ──────────────────────────────────── */
const QUOTES=[
  'Muddy water is best cleared by leaving it alone. — Alan Watts',
  'Coming, going, the waterbirds don\'t leave a trace, don\'t follow a path. — Dōgen',
  'No snowflake ever falls in the wrong place. — Zen proverb',
  'No thought, no reflection, no analysis, no cultivation, no intention — let it settle itself. — Tilopa',
  'To study the self is to forget the self. To forget the self is to be enlightened by all things. — Dōgen',
  'Emptiness is bound to bloom, like hundreds of grasses blossoming. — Dōgen',
  'Still water has no mind to receive the image of the migrating geese. — Zen proverb',
  'You are a function of what the whole universe is doing, in the same way that a wave is a function of what the whole ocean is doing. — Alan Watts',
  'Sitting quietly, doing nothing — spring comes, and the grass grows by itself. — Zenrin Kushū',
  'When you realize nothing is lacking, the whole world belongs to you. — Lao Tzu'];

/* ── PAPER TEXTURE ───────────────────────────────── */
const paperCv=document.createElement('canvas');
paperCv.width=W;paperCv.height=H;
const pc=paperCv.getContext('2d');
function buildPaper(){
  pc.fillStyle='#FFF5E5';pc.fillRect(0,0,W,H);
  const img=pc.getImageData(0,0,W,H),d=img.data;
  for(let y=0;y<H;y++){const row=Math.sin(y*0.047)*3;
    for(let x=0;x<W;x++){const i=(y*W+x)*4;
      const n=(Math.random()-0.5)*14;

  }catch(e){ooAudio=null}}

/* ── SFX ────────────────────────────────────────── */
function tone(p={}){if(muted)return;
  const{freq=440,type='sine',gain=0.1,dur=0.1,freqEnd=null,attack=0.003,detune=0}=p;
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();

  o.frequency.setValueAtTime(freq,a.currentTime);o.detune.setValueAtTime(detune,a.currentTime);
  if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,a.currentTime+dur);
  g.gain.setValueAtTime(0,a.currentTime);g.gain.linearRampToValueAtTime(gain,a.currentTime+attack);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.start(a.currentTime);o.stop(a.currentTime+dur+0.02)}catch(e){}}

function nz(p={}){if(muted)return;

/* ── CATMULL-ROM ─────────────────────────────────── */
function traceCR(ctx,pts){
  if(pts.length<2)return;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],
          p3=pts[Math.min(i+2,pts.length-1)],t=.5;
    ctx.bezierCurveTo(
      p1.x+(p2.x-p0.x)*t/3,p1.y+(p2.y-p0.y)*t/3,
      p2.x-(p3.x-p1.x)*t/3,p2.y-(p3.y-p1.y)*t/3,
      p2.x,p2.y)}}

/* ── STROKE RENDERING ────────────────────────────── */
function drawStroke(ctx,pts,col,wt,op){
  if(pts.length<2)return;
  ctx.save();ctx.globalAlpha=op*0.22;ctx.strokeStyle=col;
  ctx.lineWidth=wt*2.2;ctx.lineCap='round';ctx.lineJoin='round';
  traceCR(ctx,pts);ctx.stroke();ctx.restore();
  ctx.save();ctx.globalAlpha=op*0.88;ctx.strokeStyle=col;
  ctx.lineWidth=wt*0.75;ctx.lineCap='round';ctx.lineJoin='round';
  traceCR(ctx,pts);ctx.stroke();ctx.restore()}

function commitStroke(pts,col,wt,op){
  if(pts.length<2)return;
  const jp=pts.map((p,i)=>{
    if(i===0||i===pts.length-1)return p;
    const nx=pts[Math.min(i+1,pts.length-1)].x-pts[i-1].x;
    const ny=pts[Math.min(i+1,pts.length-1)].y-pts[i-1].y;
    const len=Math.hypot(nx,ny)||1;
    const j=(Math.sin(p.x*0.73+p.y*1.31)*0.5)*1.0;
    return{x:p.x+(-ny/len)*j,y:p.y+(nx/len)*j}});
  drawStroke(dc,jp,col,wt,op)}

let prevMY=H/2,padVel=0;

/* mkBall spawns from any of the four edges */
function mkBall(){
  const edge=Math.floor(Math.random()*4);
  let x,y,vx,vy;
  const s=BASE_SPD+lv*0.18;
  const a=Math.random()*0.55+0.18;
  if(edge===0){
    x=BR+2;y=H/2+(Math.random()-0.5)*200;
    vx=Math.cos(a)*s;vy=(Math.random()-0.5)*s*0.8;
  }else if(edge===1){
    x=W-BR-2;y=H/2+(Math.random()-0.5)*200;
    vx=-Math.cos(a)*s;vy=(Math.random()-0.5)*s*0.8;
  }else if(edge===2){
    x=W/2+(Math.random()-0.5)*400;y=BR+2;
    vx=(Math.random()-0.5)*s*0.8;vy=Math.cos(a)*s;
  }else{
    x=W/2+(Math.random()-0.5)*400;y=H-BR-2;
    vx=(Math.random()-0.5)*s*0.8;vy=-Math.cos(a)*s;
  }
  if(Math.abs(vx)<BASE_SPD*0.3){
    vx=(Math.random()<0.5?1:-1)*BASE_SPD*0.35}
  const col=pal().cols[colIdx%pal().cols.length];
  colIdx++;
  return{
    x,y,vx,vy,col,
    wt:1.0+Math.random()*1.4,
    op:0.50+Math.random()*0.18,
    spin:(Math.random()-0.5)*0.18,
    pts:[],scol:col,alpha:0}}

/* ── PHYSICS ────────────────────────────────────── */

/* ── ROUNDED CORNER COLLISION ────────────────────── */
function wallHit(b){
  for(const c of CORNERS){
    const inX=(c.cx<=CR)?(b.x<c.cx):(b.x>c.cx);
    const inY=(c.cy<=CR)?(b.y<c.cy):(b.y>c.cy);
    if(inX&&inY){
      const dx=b.x-c.cx,dy=b.y-c.cy,dist=Math.hypot(dx,dy);
      if(dist+BR>CR&&dist>0){
        const nx=dx/dist,ny=dy/dist;
        b.x=c.cx+nx*(CR-BR-0.5);b.y=c.cy+ny*(CR-BR-0.5);
        const dot=b.vx*nx+b.vy*ny;
        if(dot>0){b.vx-=2*dot*nx;b.vy-=2*dot*ny;return true}}
      return false}}
  if(b.y-BR<0){
    b.y=BR;b.vy=Math.abs(b.vy)*0.92;
    const spd=Math.hypot(b.vx,b.vy);
    const ang=Math.atan2(b.vy,b.vx)+(Math.random()-0.5)*0.28;
    b.vx=Math.cos(ang)*spd;b.vy=Math.sin(ang)*spd;
    return true}
  if(b.y+BR>H){
    b.y=H-BR;b.vy=-Math.abs(b.vy)*0.92;
    const spd=Math.hypot(b.vx,b.vy);
    const ang=Math.atan2(b.vy,b.vx)+(Math.random()-0.5)*0.28;
    b.vx=Math.cos(ang)*spd;b.vy=Math.sin(ang)*spd;
    return true}
  return false}

function enforceMinAngle(b){
  const minA=Math.PI/10;
  const spd=Math.hypot(b.vx,b.vy);
  const ang=Math.atan2(b.vy,b.vx);
  const fromH=Math.min(Math.abs(ang),Math.PI-Math.abs(ang));
  if(fromH<minA){
    const sy=b.vy>=0?1:-1;
    const sx=b.vx>=0?1:-1;
    b.vx=sx*Math.cos(minA)*spd;
    b.vy=sy*Math.sin(minA)*spd}}

/* ── PADDLE HIT ──────────────────────────────────── */
function bspd(b){return Math.hypot(b.vx,b.vy)}

function sweptHit(b){
  const px0=b.x-b.vx,py0=b.y-b.vy;
  if(b.vx<0){const face=PX+PW;
    if(Math.min(px0,b.x)-BR<=face&&Math.max(px0,b.x)+BR>=face){
      const t=(face-(px0-BR))/(b.x-BR-(px0-BR));
      const iy=py0+t*(b.y-py0);
      if(iy>=player.y-BR&&iy<=player.y+PH+BR){
        const rel=(iy-(player.y+PH/2))/(PH/2);
        const ang=rel*0.62,s=Math.min(bspd(b)*1.04,MAX_SPD);
        b.vx=Math.abs(Math.cos(ang)*s);b.vy=Math.sin(ang)*s;
        b.x=face+BR+1;b.y=iy;
        const pvSpin=padVel*0.032;
        const randSpin=(Math.random()-0.5)*0.14;
        b.spin=pvSpin+randSpin;
        commitStroke(b.pts,b.scol,b.wt,b.op);
        b.col=nextCol();b.scol=b.col;b.pts=[{x:b.x,y:b.y}];
        sndScratch();sndChalk();
        domPaddleLeft.classList.remove('paddle-hit');
        void domPaddleLeft.offsetWidth;
        domPaddleLeft.classList.add('paddle-hit');
        enforceMinAngle(b);return true}}}
  if(b.vx>0){const face=AX;
    if(Math.max(px0,b.x)+BR>=face&&Math.min(px0,b.x)-BR<=face+PW){
      const t=(face-(px0+BR))/(b.x+BR-(px0+BR));
      const iy=py0+t*(b.y-py0);
      if(iy>=ai.y-BR&&iy<=ai.y+PH+BR){
        const rel=(iy-(ai.y+PH/2))/(PH/2);
        const ang=rel*0.62,s=Math.min(bspd(b)*1.03,MAX_SPD);
        b.vx=-Math.abs(Math.cos(ang)*s);b.vy=Math.sin(ang)*s;
        b.x=face-BR-1;b.y=iy;
        b.spin=(Math.random()-0.5)*0.20;
        commitStroke(b.pts,b.scol,b.wt,b.op);
        b.col=nextCol();b.scol=b.col;b.pts=[{x:b.x,y:b.y}];
        sndScratch();sndChalk();
        domPaddleRight.classList.remove('paddle-hit');
        void domPaddleRight.offsetWidth;
        domPaddleRight.classList.add('paddle-hit');
        enforceMinAngle(b);return true}}}
  return false}

function ballBall(){
  for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){
    const a=balls[i],b=balls[j];
    const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy),minD=BR*2+2;
    if(dist<minD&&dist>0){
      const nx=dx/dist,ny=dy/dist,ov=(minD-dist)/2;
      a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
      const dot=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
      if(dot>0){
        a.vx-=dot*nx;a.vy-=dot*ny;
        b.vx+=dot*nx;b.vy+=dot*ny;
        const s=(Math.random()*0.12+0.06);
        a.spin+=s;b.spin-=s;
        sndCollide()}}}}

/* ── AI ──────────────────────────────────────────── */
function updateAI(){
  const tgt=balls.filter(b=>b.vx>0).sort((a,b)=>b.x-a.x)[0];
  const ty=tgt?tgt.y:H/2;
  const jitter=Math.sin(Date.now()*0.002)*3;
  const d=ty-(ai.y+PH/2)+jitter;
  const maxStep=Math.max(aiSpd,4.2);
  ai.y+=Math.sign(d)*Math.min(Math.abs(d),maxStep);
  const lag=ty-(ai.y+PH/2);
  if(Math.abs(lag)>80){ai.y+=Math.sign(lag)*2.5}
  ai.y=Math.max(PAD_MIN,Math.min(PAD_MAX,ai.y))}

/* ── UPDATE ──────────────────────────────────────── */
function update(){
  padVel=mouseY-prevMY;prevMY=mouseY;
  player.y=Math.max(PAD_MIN,Math.min(PAD_MAX,mouseY-PH/2));
  updateAI();

  frameCount++;

  balls.forEach(b=>{
    if(Math.abs(b.spin)>0.0002){
      const spd=bspd(b)||1;
      const px=-b.vy/spd;
      const py= b.vx/spd;
      b.vx+=px*b.spin;
      b.vy+=py*b.spin;
      const newSpd=bspd(b);
      if(newSpd>0){b.vx=b.vx/newSpd*spd;b.vy=b.vy/newSpd*spd}
      b.spin*=0.997}

    b.x+=b.vx;b.y+=b.vy;

    if(Math.abs(b.vx)<BASE_SPD*0.45){
      b.vx=Math.sign(b.vx||1)*BASE_SPD*0.45}

    if(wallHit(b)){
      b.spin=-b.spin*0.6+(Math.random()-0.5)*0.10;
      const _spd=Math.hypot(b.vx,b.vy);
      const _maxVY=_spd*Math.sin(0.96);
      if(Math.abs(b.vy)>_maxVY){
        b.vy=Math.sign(b.vy)*_maxVY;
        b.vx=Math.sign(b.vx||1)*Math.sqrt(_spd*_spd-b.vy*b.vy)}
      commitStroke(b.pts,b.scol,b.wt,b.op);
      b.col=nextCol();b.scol=b.col;b.pts=[{x:b.x,y:b.y}];sndThud();enforceMinAngle(b)}
    sweptHit(b);
    const cs2=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    const capSpd=BASE_SPD*1.6;
    if(cs2>capSpd){const ratio=capSpd/cs2;b.vx*=ratio;b.vy*=ratio}
    b.pts.push({x:b.x,y:b.y});
    if(b.alpha<1)b.alpha=Math.min(1,b.alpha+0.05);
    if(b.pts.length>500){commitStroke(b.pts,b.scol,b.wt,b.op);b.pts=b.pts.slice(-4)}});

  ballBall();

  balls=balls.filter(b=>{
    if(b.x<-30){commitStroke(b.pts,b.scol,b.wt,b.op);
      as++;updScore();sndPoint();checkLv();
      frameEl.classList.remove('canvas-glow');
      void frameEl.offsetWidth;
      frameEl.classList.add('canvas-glow');
      setTimeout(()=>frameEl.classList.remove('canvas-glow'),700);
      return false}
    if(b.x>W+30){commitStroke(b.pts,b.scol,b.wt,b.op);
      ps++;updScore();sndPoint();checkLv();
      frameEl.classList.remove('canvas-glow');
      void frameEl.offsetWidth;
      frameEl.classList.add('canvas-glow');
      setTimeout(()=>frameEl.classList.remove('canvas-glow'),700);
      return false}
    return true});
  while(balls.length<maxB&&state==='playing')balls.push(mkBall());
  if((ps>=WIN||as>=WIN)&&state==='playing'){state='results';setTimeout(showResults,500)}}

function checkLv(){const tot=ps+as;
  if(tot>0&&tot%2===0){lv++;aiSpd=Math.min(2.6+lv*0.40,7.5);
    balls.forEach(b=>{const s=Math.min(bspd(b)*1.06,MAX_SPD),
      a=Math.atan2(b.vy,b.vx);b.vx=Math.cos(a)*s;b.vy=Math.sin(a)*s});sndLevelUp()}}

/* ── DRAW ────────────────────────────────────────── */
function drawSlits(ctx){
  if(state==='results')return;
  const sw=3,sh=16,sr=1.5;
  const slits=[
    {x:PX+PW/2-sw/2,y:PAD_MIN-sh},
    {x:PX+PW/2-sw/2,y:PAD_MAX+PH},
    {x:AX+PW/2-sw/2,y:PAD_MIN-sh},
    {x:AX+PW/2-sw/2,y:PAD_MAX+PH}];
  ctx.save();
  ctx.fillStyle='rgba(100,95,88,0.50)';
  slits.forEach(({x,y})=>{
    ctx.beginPath();
    ctx.moveTo(x+sr,y);ctx.lineTo(x+sw-sr,y);
    ctx.quadraticCurveTo(x+sw,y,x+sw,y+sr);
    ctx.lineTo(x+sw,y+sh-sr);
    ctx.quadraticCurveTo(x+sw,y+sh,x+sw-sr,y+sh);
    ctx.lineTo(x+sr,y+sh);ctx.quadraticCurveTo(x,y+sh,x,y+sh-sr);
    ctx.lineTo(x,y+sr);ctx.quadraticCurveTo(x,y,x+sr,y);
    ctx.closePath();ctx.fill();});
  ctx.restore()}

function drawBall(b){
  cx.save();
  cx.globalAlpha=0.90*(b.alpha||1);
  cx.fillStyle=b.col;
  cx.beginPath();
  cx.arc(b.x,b.y,BR*0.9,0,Math.PI*2);
  cx.fill();
  cx.restore()}

/* ── DOM PADDLES ────────────────────────────────── */
function updateDOMPaddles(){
  const p=pal();
  /* Paddles live inside #wrap which is inside #gc (the scaled container).
     Canvas logical size = 1000×630. CSS size of #c = 1000×630px.
     Both are in the same coordinate space inside #gc — no scaling needed. */
  domPaddleLeft.style.top=player.y+'px';
  domPaddleRight.style.top=ai.y+'px';
  /* update colours to match current palette */
  domPaddleLeft.querySelectorAll('.paddle-bar,.paddle-dot').forEach(el=>el.style.background=p.pL);
  domPaddleRight.querySelectorAll('.paddle-bar,.paddle-dot').forEach(el=>el.style.background=p.pR)}

/* ── RENDER LOOP ────────────────────────────────── */
function loop(){
  cx.drawImage(drawCv,0,0);
  if(state==='playing'){
    balls.forEach(b=>{if(b.pts.length>1)drawStroke(cx,b.pts,b.scol,b.wt,b.op)});
    balls.forEach(drawBall);
    update()}
  if(state==='idle'){
    player.y=Math.max(PAD_MIN,Math.min(PAD_MAX,mouseY-PH/2))}
  if(state!=='results'){
    updateDOMPaddles()}
  drawSlits(cx);
  requestAnimationFrame(loop)}

/* ── CURSOR ──────────────────────────────────────── */
document.addEventListener('mousemove',e=>{
  tryStartBGM();
  rawMX=e.clientX;rawMY=e.clientY;
  cursorEl.style.left=rawMX+'px';cursorEl.style.top=rawMY+'px';
  const r=cv.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
  mouseY=(e.clientY-r.top)*(H/r.height)});

cv.addEventListener('touchmove',e=>{e.preventDefault();
  const t=e.touches[0],r=cv.getBoundingClientRect();
  mouseX=(t.clientX-r.left)*(W/r.width);
  mouseY=(t.clientY-r.top)*(H/r.height)},{passive:false});

/* CHANGE 8: idle doodle loops continuously */
let idleTimer=null;
function startDoodle(){
  const pts=[];for(let i=0;i<10;i++)pts.push({x:80+Math.random()*(W-160),y:60+Math.random()*(H-120)});
  const dense=[];
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
    for(let t=0;t<1;t+=.02){const t2=t*t,t3=t2*t;
      dense.push({
        x:.5*((-p0.x+3*p1.x-3*p2.x+p3.x)*t3+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+p2.x)*t+2*p1.x),
        y:.5*((-p0.y+3*p1.y-3*p2.y+p3.y)*t3+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+p2.y)*t+2*p1.y)})}}
  let idx=0;const cols=pal().cols;let dc0=cols[0],segS=0;
  const wt=1.1+Math.random()*.6,op=.32;
  idleTimer=setInterval(()=>{
    if(state!=='idle'||idx>=dense.length){
      clearInterval(idleTimer);idleTimer=null;
      if(state==='idle'){
        setTimeout(()=>{
          if(state==='idle'){initDraw();startDoodle()}
        },600)}
      return}
    const end=Math.min(idx+3,dense.length);
    if(idx>0)drawStroke(dc,dense.slice(Math.max(0,idx-2),end+1),dc0,wt,op);
    if(idx-segS>80){segS=idx;dc0=cols[(cols.indexOf(dc0)+1)%cols.length]}
    idx=end},32)}

/* ── STATE MACHINE ──────────────────────────────── */
let state='idle',ps=0,as=0,maxB=1,lv=1,aiSpd=2.6;
function tryStartBGM(){
  try{
    if(!ooGain){initOolong()}
  }catch(e){}}
let frameCount=0;
let player={y:H/2-PH/2},ai={y:H/2-PH/2};
let balls=[],mouseX=W/2,mouseY=H/2,rawMX=0,rawMY=0;

function setState(s){state=s;gc.setAttribute('data-state',s)}

function showResults(){
  sndGameOver();
  balls.forEach(b=>commitStroke(b.pts,b.scol,b.wt,b.op));
  balls=[];
  frameEl.classList.add('canvas-glow');
  setTimeout(()=>frameEl.classList.remove('canvas-glow'),700);
  setTimeout(()=>{
    setState('results');
    const selectedQuote=QUOTES[Math.floor(Math.random()*QUOTES.length)];
    document.getElementById('quote-below').textContent=selectedQuote;
    if(ooGain&&actx&&!muted){
      ooGain.gain.cancelScheduledValues(actx.currentTime);
      ooGain.gain.setValueAtTime(ooGain.gain.value,actx.currentTime);
      ooGain.gain.linearRampToValueAtTime(0.42,actx.currentTime+2.0);
    }
    document.getElementById('ctrl-row').style.display='none';
  },650);
}

function showIdle(){
  setState('idle');
  if(ooGain&&actx&&!muted){
    ooGain.gain.cancelScheduledValues(actx.currentTime);
    ooGain.gain.setValueAtTime(ooGain.gain.value,actx.currentTime);
    ooGain.gain.linearRampToValueAtTime(0.42,actx.currentTime+1.5);
  }
  document.getElementById('ctrl-row').style.display='';
  introCard.classList.remove('card-hide');
  initDraw();startDoodle();updDots()}

/* CHANGE 3: card fade-out transition on game start */
function startGame(){
  ac();
  startBGM();
  ps=0;as=0;lv=1;aiSpd=2.6;colIdx=0;frameCount=0;
  balls=[];initDraw();updScore();
  if(idleTimer){clearInterval(idleTimer);idleTimer=null}
  /* CHANGE 4: canvas glow on start */
  frameEl.classList.add('canvas-glow');
  setTimeout(()=>frameEl.classList.remove('canvas-glow'),700);
  if(state==='idle'){
    introCard.classList.add('card-hide');
    setTimeout(()=>{
      document.getElementById('ctrl-row').style.display='';
      setState('playing');
      introCard.classList.remove('card-hide');
      for(let i=0;i<maxB;i++)balls.push(mkBall())
    },300)
  }else{
    document.getElementById('ctrl-row').style.display='';
    setState('playing');
    for(let i=0;i<maxB;i++)balls.push(mkBall())}}

/* ── UI HELPERS ──────────────────────────────────── */
function updScore(){
  const yu=document.getElementById('score-you');
  const ai=document.getElementById('score-ai');
  const prevPs=parseInt(yu.textContent)||0;
  const prevAs=parseInt(ai.textContent)||0;
  yu.textContent=ps;
  ai.textContent=as;
  if(ps>prevPs){
    yu.classList.remove('score-pop');
    void yu.offsetWidth;
    yu.classList.add('score-pop');
  }
  if(as>prevAs){
    ai.classList.remove('score-pop');
    void ai.offsetWidth;
    ai.classList.add('score-pop');
  }
}
function updDots(){
  const c=pal().cols;
  for(let i=0;i<5;i++)document.getElementById('pd'+i).style.background=c[i]}
function shufflePal(){colIdx=0;updDots()}

/* ── EVENT LISTENERS ────────────────────────────── */
document.addEventListener('touchstart',tryStartBGM,{once:true});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();
    if(state==='idle')startGame();
    else if(state==='results')showIdle()}});
introCard.addEventListener('click',()=>{if(state==='idle')startGame()});
cv.addEventListener('click',()=>{if(state==='idle')startGame()});
document.getElementById('shuffle-btn').addEventListener('click',e=>{e.stopPropagation();shufflePal()});
document.getElementById('restart-pill').addEventListener('click',()=>{
  if(state==='playing'){balls.forEach(b=>commitStroke(b.pts,b.scol,b.wt,b.op));startGame()}});
document.getElementById('mute-pill').addEventListener('click',()=>{
  muted=!muted;
  if(muted&&ooGain&&actx){
    ooGain.gain.cancelScheduledValues(actx.currentTime);
    ooGain.gain.setValueAtTime(ooGain.gain.value,actx.currentTime);
    ooGain.gain.linearRampToValueAtTime(0,actx.currentTime+0.3);
  }else if(!muted&&ooGain&&actx&&bgmStarted){
    const vol=state==='playing'?0.55:0.38;
    ooGain.gain.cancelScheduledValues(actx.currentTime);
    ooGain.gain.setValueAtTime(0,actx.currentTime);
    ooGain.gain.linearRampToValueAtTime(vol,actx.currentTime+1.0);
  }
  document.getElementById('ico-von').style.display=muted?'none':'block';
  document.getElementById('ico-voff').style.display=muted?'block':'none';
  document.getElementById('mute-pill').classList.toggle('muted',muted);})

/* ── SAVE ARTWORK ────────────────────────────────── */
document.getElementById('btn-save').addEventListener('click',()=>{
  const S=2;
  const PAD=32;
  const quoteH=100;
  const outW=(W+PAD*2)*S;
  const outH=(H+PAD*2+quoteH)*S;
  const out=document.createElement('canvas');
  out.width=outW;out.height=outH;
  const oc=out.getContext('2d');

  /* background */
  oc.fillStyle='#383838';
  oc.fillRect(0,0,outW,outH);

  /* canvas area with rounded corners + shadow */
  const sx=PAD*S,sy=PAD*S,sw=W*S,sh=H*S,r=48*S;
  oc.save();
  oc.shadowColor='rgba(0,0,0,0.45)';
  oc.shadowBlur=20*S;
  oc.shadowOffsetY=4*S;
  oc.beginPath();
  oc.moveTo(sx+r,sy);oc.lineTo(sx+sw-r,sy);
  oc.quadraticCurveTo(sx+sw,sy,sx+sw,sy+r);
  oc.lineTo(sx+sw,sy+sh-r);
  oc.quadraticCurveTo(sx+sw,sy+sh,sx+sw-r,sy+sh);
  oc.lineTo(sx+r,sy+sh);
  oc.quadraticCurveTo(sx,sy+sh,sx,sy+sh-r);
  oc.lineTo(sx,sy+r);
  oc.quadraticCurveTo(sx,sy,sx+r,sy);
  oc.closePath();
  oc.fillStyle='#FFF5E5';oc.fill();
  oc.restore();

  /* clip and draw artwork */
  oc.save();
  oc.beginPath();
  oc.moveTo(sx+r,sy);oc.lineTo(sx+sw-r,sy);
  oc.quadraticCurveTo(sx+sw,sy,sx+sw,sy+r);
  oc.lineTo(sx+sw,sy+sh-r);
  oc.quadraticCurveTo(sx+sw,sy+sh,sx+sw-r,sy+sh);
  oc.lineTo(sx+r,sy+sh);
  oc.quadraticCurveTo(sx,sy+sh,sx,sy+sh-r);
  oc.lineTo(sx,sy+r);
  oc.quadraticCurveTo(sx,sy,sx+r,sy);
  oc.closePath();
  oc.clip();
  oc.drawImage(drawCv,sx,sy,sw,sh);
  oc.restore();

  /* haiku quote */
  const quoteText=document.getElementById('quote-below').textContent;
  oc.font='italic '+(12*S)+'px "Basier Circle",sans-serif';
  oc.fillStyle='rgba(245,240,230,0.65)';
  oc.textAlign='center';
  oc.textBaseline='middle';
  oc.fillText(quoteText,outW/2,(PAD+H+22)*S);

  /* ZEN•PONG logo text — 16px below haiku */
  oc.font='500 '+(11*S)+'px "Basier Circle",sans-serif';
  oc.fillStyle='rgba(245,240,230,0.35)';
  oc.textAlign='center';
  oc.textBaseline='middle';
  oc.fillText('| ZEN \u2022 PONG |',outW/2,(PAD+H+60)*S);

  /* download */
  const a=document.createElement('a');
  a.download='zen-pong-'+Date.now()+'.png';
  a.href=out.toDataURL('image/png');
  document.body.appendChild(a);a.click();document.body.removeChild(a)});

document.getElementById('btn-again').addEventListener('click',()=>{showIdle()});

/* ── VIEWPORT SCALING ────────────────────────────── */
function resize(){const vw=window.innerWidth,vh=window.innerHeight;
  const s=Math.min(vw/1080,vh/960,1);gc.style.transform='scale('+s+')'}
window.addEventListener('resize',resize);resize();

/* ── BOOT ────────────────────────────────────────── */
updDots();showIdle();loop();
</script>
